<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Theo dõi doanh thu và tính lương tuần cá nhân - 25% hoa hồng">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>💰 Sale Tracker - Lương Tuần</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER / SUMMARY CARD ===== -->
    <header class="summary-card" id="summary-card">
      <div class="summary-badge">HOA HỒNG 25%</div>
      <p class="summary-label">Lương tuần này</p>
      <h1 class="summary-amount" id="weekly-salary">0đ</h1>
      <div class="summary-divider"></div>
      <div class="summary-row">
        <div class="summary-stat">
          <span class="stat-value" id="weekly-order-count">0</span>
          <span class="stat-label">đơn hàng</span>
        </div>
        <div class="summary-stat">
          <span class="stat-value" id="weekly-revenue">0đ</span>
          <span class="stat-label">doanh thu</span>
        </div>
      </div>
      <button class="btn-reset" id="btn-reset">
        <span class="btn-reset-icon">↻</span> Reset Tuần Mới
      </button>
    </header>

    <!-- ===== WEEK NAVIGATION ===== -->
    <nav class="week-nav" id="week-nav">
      <button class="week-nav-btn" id="btn-week-prev" aria-label="Tuần trước">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <span class="week-nav-label" id="week-nav-label">Tuần này</span>
      <button class="week-nav-btn" id="btn-week-next" aria-label="Tuần sau" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </nav>

    <!-- ===== DAY SELECTOR ===== -->
    <section class="day-selector-wrapper">
      <div class="day-selector" id="day-selector">
        <!-- 7 day pills rendered by JS -->
      </div>
    </section>

    <!-- ===== INPUT SECTION ===== -->
    <section class="input-section glass-card">
      <label class="input-label" for="txt-sale-amount">Nhập đơn hàng mới</label>
      <div class="input-group">
        <div class="input-wrapper" id="input-wrapper">
          <span class="input-prefix">đ</span>
          <input
            type="text"
            id="txt-sale-amount"
            class="sale-input"
            placeholder="0"
            inputmode="numeric"
            autocomplete="off"
          >
        </div>
        <button class="btn-add" id="btn-add">
          <span class="btn-add-icon">+</span>
          <span class="btn-add-text">Thêm</span>
        </button>
      </div>

      <!-- Tên khách hàng (không bắt buộc) -->
      <div class="input-row">
        <div class="input-wrapper input-wrapper-full">
          <span class="input-prefix">👤</span>
          <input
            type="text"
            id="txt-customer-name"
            class="sale-input customer-input"
            placeholder="Tên khách hàng (tuỳ chọn)"
            autocomplete="off"
          >
        </div>
      </div>

      <!-- Bộ đếm Khách đánh giá -->
      <div class="input-row review-row">
        <span class="review-label">⭐ Khách đánh giá</span>
        <div class="review-stepper">
          <button class="stepper-btn" id="btn-review-minus" aria-label="Giảm">−</button>
          <span class="stepper-value" id="review-count">0</span>
          <button class="stepper-btn stepper-btn-plus" id="btn-review-plus" aria-label="Tăng">+</button>
        </div>
        <span class="review-bonus-preview" id="review-bonus-preview">+0đ</span>
      </div>
    </section>

    <!-- ===== ORDER LIST ===== -->
    <section class="order-section glass-card">
      <div class="order-header">
        <h2 class="section-title" id="order-list-title">📋 Đơn hàng trong ngày</h2>
        <span class="order-count-badge" id="order-count-badge">0</span>
      </div>
      <div class="order-list" id="order-list">
        <!-- Orders rendered by JS -->
      </div>
      <div class="daily-total" id="daily-total">
        <span class="daily-total-label">💵 Hoa hồng hôm nay</span>
        <span class="daily-total-amount" id="daily-total-amount">0đ</span>
      </div>
    </section>

  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal">
    <div class="modal-content glass-card">
      <h3 style="margin: 0 0 15px 0; font-size: 1.1rem;">✏️ Sửa đơn hàng</h3>
      
      <div class="input-row">
        <label class="input-label" style="font-size: 0.85rem; margin-bottom: 5px;">Số tiền</label>
        <div class="input-wrapper-full" style="position: relative;">
          <input type="tel" id="edit-sale-amount" class="txt-input numeric-input" placeholder="0">
          <span class="currency-suffix">đ</span>
        </div>
      </div>

      <div class="input-row">
        <label class="input-label" style="font-size: 0.85rem; margin-bottom: 5px; margin-top: 10px;">Tên khách hàng</label>
        <div class="input-wrapper-full">
          <input type="text" id="edit-customer-name" class="txt-input customer-input" placeholder="Tên khách hàng">
        </div>
      </div>

      <div class="review-row" style="margin-top: 15px; justify-content: space-between;">
        <span class="review-label">⭐ Khách đánh giá:</span>
        <div class="review-stepper" style="margin-left: auto;">
          <button class="stepper-btn" id="btn-edit-review-minus">−</button>
          <span class="stepper-value" id="edit-review-count">0</span>
          <button class="stepper-btn stepper-btn-plus" id="btn-edit-review-plus">+</button>
        </div>
      </div>

      <div class="modal-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
        <button class="btn btn-secondary" id="btn-edit-cancel" style="padding: 10px 16px; font-size: 0.9rem; flex: 1; background: rgba(255,255,255,0.1);">Hủy</button>
        <button class="btn btn-primary" id="btn-edit-save" style="padding: 10px 16px; font-size: 0.9rem; flex: 1;">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
